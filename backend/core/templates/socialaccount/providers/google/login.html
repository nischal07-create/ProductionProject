{% load i18n %}
<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>{% trans "Google sign-in" %}</title>
    <style>
      :root{--primary:#0f766e;--bg:#f8fafc}
      body{font-family:Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;background:var(--bg);color:#0f172a;margin:0}
      .wrap{max-width:820px;margin:36px auto;padding:18px}
      .card{background:#fff;padding:20px;border-radius:12px;box-shadow:0 8px 20px rgba(2,6,23,0.06)}
      .btn{display:inline-flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;border:1px solid rgba(15,118,110,0.12);background:linear-gradient(135deg,#fff,#f0fdf4);color:var(--primary);font-weight:700;text-decoration:none}
      .google-logo{width:20px;height:20px}
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>{% trans "Continue with Google" %}</h1>
        <p class="hint">{% trans "Sign in quickly with your Google account." %}</p>
        <form method="post" action="">
          {% csrf_token %}
          <input type="hidden" name="process" value="login" />
          <input type="hidden" name="next" value="{{ request.GET.next|default:'/app/' }}" />
          <button type="submit" class="btn">
            <img src="/static/core/google-icon.svg" class="google-logo" alt="G" onerror="this.style.display='none'"/>
            {% trans "Sign in with Google" %}
          </button>
        </form>
      </div>
    </div>
  </body>
</html>
