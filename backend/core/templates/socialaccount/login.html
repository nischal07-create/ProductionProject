{% load i18n %}
<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>{% trans "Sign In" %}</title>
    <style>
      :root{--primary:#0f766e;--bg:#f8fafc;--card:#ffffff}
      body{font-family:Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; background:var(--bg); margin:0; color:#0f172a}
      .wrap{max-width:920px;margin:36px auto;padding:22px}
      .card{background:var(--card);padding:22px;border-radius:12px;box-shadow:0 10px 24px rgba(2,6,23,0.06)}
      h1{margin:0 0 8px;font-size:22px}
      p.hint{color:#475569;margin:0 0 18px}
      .actions{display:flex;gap:12px}
      .btn{display:inline-flex;align-items:center;gap:8px;padding:10px 16px;border-radius:10px;border:1px solid rgba(15,118,110,0.12);background:linear-gradient(135deg,var(--card),#f0fdf4);color:var(--primary);font-weight:700;text-decoration:none}
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>{% trans "Sign In Via Google" %}</h1>
        <p class="hint">{% trans "You are about to sign in using a third-party account from Google." %}</p>
        <form method="post" action="">
          {% csrf_token %}
          <div class="actions">
            <button type="submit" class="btn">{% trans "Continue" %}</button>
            <a href="/" class="btn" style="background:transparent;border:1px solid rgba(15,23,42,0.06);color:#334155">{% trans "Cancel" %}</a>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
